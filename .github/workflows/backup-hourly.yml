name: Backup Horario de Base de Datos

on:
  schedule:
    # Ejecutar cada hora en la minuto 0
    - cron: '0 * * * *'
  workflow_dispatch: # Permitir ejecución manual

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Instalar PostgreSQL client
          sudo apt-get update
          sudo apt-get install -y postgresql-client

          # Crear directorio de backups
          mkdir -p backups

          # Hacer backup con timestamp
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="backups/backup_$TIMESTAMP.sql.gz"
          
          echo "Iniciando backup en $BACKUP_FILE..."
          pg_dump "$DATABASE_URL" --format=plain | gzip > "$BACKUP_FILE"
          
          if [ $? -eq 0 ]; then
            SIZE=$(du -h "$BACKUP_FILE" | cut -f1)
            echo "✓ Backup completado: $BACKUP_FILE ($SIZE)"
          else
            echo "✗ Error al crear backup"
            exit 1
          fi

      - name: Limpiar backups antiguos (más de 7 días)
        run: |
          find backups -name "backup_*.sql.gz" -mtime +7 -delete
          echo "Backups disponibles:"
          ls -lh backups/ || echo "No hay backups"

      - name: Subir backups a GitHub (optional)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: database-backups
          path: backups/
          retention-days: 7

      - name: Notificación de éxito
        if: success()
        run: echo "✓ Backup completado exitosamente"

      - name: Notificación de error
        if: failure()
        run: echo "✗ Error en el backup"
